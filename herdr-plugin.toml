id = "herdr-pings"
name = "Herdr Pings"
version = "0.2.0"
description = "Turn-level wake events and live scoreboard metadata for agents in herdr panes."
min_herdr_version = "0.7.4"
platforms = ["macos", "linux"]

[[events]]
on = "pane.exited"
command = ["bun", "bridge/lifecycle.js"]

[[events]]
on = "pane.closed"
command = ["bun", "bridge/lifecycle.js"]

# Convex-only hooks are additive: they never touch the production spool files.
[[events]]
on = "pane.created"
command = ["bun", "bridge/convex-event.js"]

[[events]]
on = "pane.agent_status_changed"
command = ["bun", "bridge/convex-event.js"]

[[actions]]
id = "doctor"
title = "Check herdr-pings"
command = ["bun", "actions/doctor.ts"]

[[actions]]
id = "setup"
title = "Set up herdr-pings home links"
command = ["bun", "actions/setup.ts"]

[[actions]]
id = "luggage"
title = "Let the Luggage clean old spools"
command = ["bun", "actions/luggage.ts"]

[[actions]]
id = "scoreboard-trace"
title = "Trace herdr scoreboard metadata"
command = ["bun", "actions/scoreboard-trace.ts"]
